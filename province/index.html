<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>China Discovery</title>
  <meta property="og:title" content="China Discovery">
  <meta property="og:description" content="Explore 400+ amazing destinations across China — offline, no roaming needed.">
  <meta property="og:image" content="https://northbig.github.io/og-image.jpg">
  <meta property="og:url" content="https://northbig.github.io/spot/">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      background: #f2f2f7;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 40px 32px;
      max-width: 360px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .icon { font-size: 56px; margin-bottom: 16px; }
    h1 { font-size: 24px; font-weight: 700; color: #1d1d1f; margin-bottom: 8px; }
    p  { font-size: 15px; color: #6e6e73; line-height: 1.5; margin-bottom: 32px; }
    .btn {
      display: block;
      background: #000;
      color: white;
      text-decoration: none;
      border-radius: 12px;
      padding: 14px 20px;
      font-size: 16px;
      font-weight: 600;
    }
    .btn img { height: 20px; vertical-align: middle; margin-right: 8px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🏔️</div>
    <h1>China Discovery</h1>
    <p>Explore China's most amazing destinations — offline, no roaming needed. Download the app to open this attraction.</p>
    <a class="btn" href="https://apps.apple.com/app/id6745056635">
      Download on the App Store
    </a>
  </div>
</body>
</html>
